<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberVerse від Newasoft | Офіційний сайт</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Urbanist:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        /* Ваші стилі залишаються без змін */
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Urbanist', sans-serif; background-color: #0d0d11; color: #f3f4f6; overflow-x: hidden; }
        h1, h2, h3, h4, .logo { font-family: 'Space Grotesk', sans-serif; font-weight: 700; }
        nav { position: fixed; top: 0; width: 100%; padding: 25px 10%; display: flex; justify-content: space-between; align-items: center; z-index: 100; background: rgba(13, 13, 17, 0.6); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .logo { font-size: 1.5rem; text-transform: uppercase; background: linear-gradient(45deg, #ff4e50, #f9d423); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { display: flex; align-items: center; }
        .nav-links a { color: #8e929b; text-decoration: none; margin-left: 30px; font-size: 0.95rem; transition: color 0.3s ease; display: flex; align-items: center; gap: 6px; }
        .nav-links a:hover { color: #ffffff; }
        .discord-icon { width: 18px; height: 18px; fill: currentColor; }
        .nav-links .btn-nav-reg { background: #ffffff; color: #0d0d11; padding: 8px 20px; border-radius: 20px; font-weight: 600; transition: background 0.3s, transform 0.3s; }
        .nav-links .btn-nav-reg:hover { background: #e2e4e9; color: #0d0d11; transform: translateY(-1px); }
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 20px; background: radial-gradient(circle at center, rgba(255, 78, 80, 0.12) 0%, rgba(13, 13, 17, 1) 70%); }
        .btn { display: inline-block; padding: 15px 35px; background: #ffffff; color: #0d0d11; text-decoration: none; font-weight: 600; border-radius: 50px; transition: transform 0.3s ease, box-shadow 0.3s ease; cursor: pointer; border: none; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2); }
        .btn-secondary { background: transparent; color: #fff; border: 1px solid rgba(255, 255, 255, 0.2); margin-left: 15px; }
        .floating-window { position: fixed; top: 20%; left: 35%; width: 380px; background: rgba(19, 19, 26, 0.85); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; backdrop-filter: blur(20px); z-index: 9999; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6); display: none; flex-direction: column; overflow: hidden; animation: windowSpawn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .window-header { padding: 15px 20px; background: rgba(255, 255, 255, 0.03); border-bottom: 1px solid rgba(255, 255, 255, 0.05); display: flex; justify-content: space-between; align-items: center; cursor: move; user-select: none; }
        .window-close { background: none; border: none; color: #8e929b; font-size: 1.2rem; cursor: pointer; }
        .window-body { padding: 25px; }
        .form-group { margin-bottom: 15px; }
        .form-group input { width: 100%; padding: 12px 15px; background: rgba(26, 26, 36, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 10px; color: #fff; }
        .btn-submit { width: 100%; padding: 14px; background: linear-gradient(45deg, #ff4e50, #f9d423); color: #0d0d11; font-weight: 700; border: none; border-radius: 10px; cursor: pointer; }
        @keyframes windowSpawn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Newasoft</div>
        <div class="nav-links">
            <a href="#" class="btn-nav-reg" id="openWindowBtn">Реєстрація</a>
        </div>
    </nav>

    <section class="hero">
        <h1>Дійди до кінця крізь темряву</h1>
        <p>Проєкт від розробника NewaHostius.</p>
        <a href="#" class="btn" id="heroWindowBtn">Створити Акаунт</a>
    </section>

    <div class="floating-window" id="floatingRegWindow">
        <div class="window-header" id="windowHeader">
            <div class="window-title">Реєстрація користувача</div>
            <button class="window-close" id="closeWindowBtn">&times;</button>
        </div>
        <div class="window-body">
            <form id="regForm">
                <div class="form-group">
                    <input type="text" id="username" placeholder="Нікнейм" required>
                </div>
                <div class="form-group">
                    <input type="tel" id="userphone" placeholder="Телефон" required>
                </div>
                <div class="form-group">
                    <input type="email" id="useremail" placeholder="Email" required>
                </div>
                <button type="submit" class="btn-submit">Зареєструватися</button>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();

        const win = document.getElementById('floatingRegWindow');
        const header = document.getElementById('windowHeader');
        const openBtn1 = document.getElementById('openWindowBtn');
        const openBtn2 = document.getElementById('heroWindowBtn');
        const closeBtn = document.getElementById('closeWindowBtn');
        const regForm = document.getElementById('regForm');

        const showWin = (e) => { if(e) e.preventDefault(); win.style.display = 'flex'; }
        const hideWin = () => { win.style.display = 'none'; }
        
        openBtn1.addEventListener('click', showWin);
        openBtn2.addEventListener('click', showWin);
        closeBtn.addEventListener('click', hideWin);

        // --- ЛОГІКА GITHUB ---
        const GITHUB_TOKEN = 'ВАШ_PERSONAL_ACCESS_TOKEN';
        const REPO_OWNER = 'ВАШ_НІКНЕЙМ';
        const REPO_NAME = 'НАЗВА_РЕПОЗИТОРІЮ';
        const FILE_PATH = 'users.txt';

        async function sendToGitHub(data) {
            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
            try {
                // Отримуємо поточний SHA (потрібен для оновлення)
                const getResponse = await fetch(url, { headers: { 'Authorization': `token ${GITHUB_TOKEN}` }});
                if (!getResponse.ok) throw new Error("Помилка доступу до файлу (перевірте шлях)");
                
                const fileData = await getResponse.json();
                const oldContent = atob(fileData.content);
                const newContent = oldContent + `\n${JSON.stringify(data)}`;

                // Оновлюємо файл
                await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: "Add new user",
                        content: btoa(newContent),
                        sha: fileData.sha
                    })
                });
                return true;
            } catch (err) { console.error(err); return false; }
        }

        // --- ОБРОБКА ФОРМИ ---
        regForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const registrationData = {
                nickname: document.getElementById('username').value,
                phone: document.getElementById('userphone').value,
                email: document.getElementById('useremail').value,
                timestamp: new Date().toLocaleString()
            };

            alert("Відправка даних на GitHub...");
            const isSaved = await sendToGitHub(registrationData);

            if (isSaved) {
                localStorage.setItem('cyberverse_user_session', JSON.stringify(registrationData));
                alert("Успішно! Дані відправлено в репозиторій.");
                hideWin();
                regForm.reset();
            } else {
                alert("Помилка відправки. Перевірте консоль (F12).");
            }
        });

        // Drag-n-drop вікна (залишив вашу логіку)
        let isDragging = false, currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;
        header.addEventListener('mousedown', (e) => { initialX = e.clientX - xOffset; initialY = e.clientY - yOffset; isDragging = true; });
        document.addEventListener('mousemove', (e) => { 
            if (isDragging) { e.preventDefault(); xOffset = e.clientX - initialX; yOffset = e.clientY - initialY; win.style.transform = `translate(${xOffset}px, ${yOffset}px)`; }
        });
        document.addEventListener('mouseup', () => isDragging = false);
    </script>
</body>
</html>
